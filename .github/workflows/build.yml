name: build

# Three trigger modes:
#   • push to main      → builds + publishes a rolling "latest" pre-release
#   • push of a v* tag  → builds + publishes a stable GitHub release
#   • pull_request      → builds only (no release)
#   • workflow_dispatch → manual run with optional release tag
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag to publish as (e.g. v0.2.0). Leave blank to skip release.'
        required: false
        default: ''

# The release jobs below need write access to attach binaries; PRs get
# read-only so untrusted PRs cannot abuse this token.
permissions:
  contents: write

env:
  GO_VERSION: '1.22'

jobs:
  build:
    name: build (linux/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64
          - goarch: armv7
            goarm: 7
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Single source of truth for "what version is this build". Stable
      # builds get the tag name; everything else gets dev-<sha>.
      - name: derive version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.release_tag }}" ]]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            VERSION="latest"
          else
            VERSION="dev-${GITHUB_SHA::8}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch == 'armv7' && 'arm' || matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
          CGO_ENABLED: '0'
        run: |
          LDFLAGS="-s -w \
            -X main.Version=${{ steps.ver.outputs.version }} \
            -X main.Commit=${{ steps.ver.outputs.commit }} \
            -X main.BuildDate=${{ steps.ver.outputs.date }}"
          go build -trimpath -ldflags "$LDFLAGS" -o ispof ./cmd/ispof
          mkdir -p dist
          ARCHIVE="ispof-${{ steps.ver.outputs.version }}-linux-${{ matrix.goarch }}.tar.gz"
          tar -czf "dist/$ARCHIVE" ispof
          ( cd dist && sha256sum "$ARCHIVE" > "$ARCHIVE.sha256" )
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: ispof-linux-${{ matrix.goarch }}
          path: dist/*

  # Tagged stable release. Triggers on `git push --tags` of any v* tag.
  release-stable:
    name: release (stable)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts, merge-multiple: true }
      - run: ls -la artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Rolling pre-release. Every push to main rebuilds the "latest" tag so
  # users can always download the freshest binary from
  # https://github.com/<repo>/releases/latest — no need to wait for the
  # maintainer to cut a tagged release.
  release-latest:
    name: release (latest rolling)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts, merge-multiple: true }

      # Delete the previous "latest" tag + release so the next step
      # creates a clean one. Without this, gh-release errors out on
      # duplicate tag.
      - name: delete previous latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest (rolling)
          body: |
            **Rolling pre-release**, rebuilt on every push to `main`.
            For stable versions, see the tagged releases.

            • commit: `${{ github.sha }}`
            • built : `${{ github.event.head_commit.timestamp }}`
            • author: `${{ github.event.head_commit.author.name }}`
          prerelease: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256

  # Manual release via workflow_dispatch — useful for cutting a release
  # without pushing a tag (e.g. release candidates, hotfixes).
  release-manual:
    name: release (manual)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts, merge-multiple: true }
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
          generate_release_notes: true
